, "link": "https://dart.fss.or.kr/dsaf001/main.do?rcpNo=20260318001421"}, {"c": "공시", "t": "[정기공시] 럭스로보 - 사업보고서 (2025.12)", "d": "보고기간: 2025.12 | 접수일: 2026.03.23 | 구분: 사업보고서", "s": "DART 정기공시", "tm": "03.23 00:00", "link": "https://dart.fss.or.kr/dsaf001/main.do?rcpNo=20260323001564"}, {"c": "공시", "t": "[정기공시] 대교 - [기재정정]사업보고서 (2025.12)", "d": "보고기간: 2025.12 | 접수일: 2026.06.09 | 구분: 사업보고서", "s": "DART 정기공시", "tm": "06.09 00:00", "link": "https://dart.fss.or.kr/dsaf001/main.do?rcpNo=20260609000080"}];
const CURRENT_CATEGORIES = [{"c": "IPO/투자", "count": 97}, {"c": "정책자금/지원사업", "count": 52}, {"c": "AI/기술", "count": 194}, {"c": "디지털휴먼/가상인간", "count": 23}, {"c": "로보틱스/피지컬AI", "count": 52}, {"c": "AI반도체/인프라", "count": 67}, {"c": "IP/K-Culture/저작권", "count": 31}, {"c": "공연/뮤지컬/음악/디지털콘텐츠", "count": 68}, {"c": "Web3/블록체인/금융", "count": 31}, {"c": "AX/DX/정책", "count": 17}, {"c": "공시", "count": 100}];
const CURRENT_TOTAL = 732;
const CURRENT_GEN = "2026.07.11 11:31";

let ARTICLES = disclosureLast(CURRENT_ARTICLES);
let CATEGORIES = disclosureLast(CURRENT_CATEGORIES);
let active = "전체";

function disclosureLast(list){
  const disclosure = list.filter(item => item.c === "공시");
  const others = list.filter(item => item.c !== "공시");
  return others.concat(disclosure);
}

function categoriesFromArticles(articles){
  const counts = new Map();
  articles.forEach(a => counts.set(a.c, (counts.get(a.c) || 0) + 1));
  return disclosureLast([...counts.entries()].map(([c, count]) => ({ c, count })));
}

function renderRail(){
  const rail = document.getElementById('rail');
  rail.innerHTML = "";
  rail.appendChild(makeRow("전체", ARTICLES.length));
  CATEGORIES.forEach(cat => rail.appendChild(makeRow(cat.c, cat.count)));
}
function makeRow(name, count){
  const el = document.createElement('div');
  el.className = 'cat' + (name === active ? ' active' : '');
  el.innerHTML = `<span>${name}</span><span class="count">${count}</span>`;
  el.onclick = () => { active = name; renderRail(); renderCards(); };
  return el;
}
function renderCards(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  let list = active === "전체" ? ARTICLES : ARTICLES.filter(a => a.c === active);
  if (q) list = list.filter(a => (a.t + a.d).toLowerCase().includes(q));

  document.getElementById('current-cat').textContent = active;
  document.getElementById('current-count').textContent = list.length + "건";

  const wrap = document.getElementById('cards');
  const empty = document.getElementById('empty');
  wrap.innerHTML = "";
  if (list.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  list.forEach(a => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = a.link;
    card.target = '_blank';
    card.rel = 'noopener';
    card.innerHTML = `
      <h3>${a.t}</h3>
      ${a.d ? `<p>${a.d}</p>` : ''}
      <div class="meta"><span class="src">${a.s}</span><span>${a.tm}</span></div>
    `;
    wrap.appendChild(card);
  });
}

// ---- 과거 다이제스트 아카이브 ----
async function loadArchiveList(){
  const sel = document.getElementById('archive-select');
  try {
    const res = await fetch('archive/index.json', { cache: 'no-store' });
    if (!res.ok) return;
    const list = await res.json();
    if (!Array.isArray(list) || list.length === 0) return;

    sel.innerHTML = '<option value="__current__">최신 (' + CURRENT_GEN + ')</option>' +
      list.map(e => `<option value="${e.file}">${e.label}</option>`).join('');
    sel.style.display = 'inline-block';
    sel.onchange = onArchiveChange;
  } catch (e) {
    // 아카이브가 아직 없거나 fetch 실패 시 드롭다운 없이 현재 화면 그대로 유지
  }
}
async function onArchiveChange(e){
  const val = e.target.value;
  if (val === '__current__') {
    ARTICLES = disclosureLast(CURRENT_ARTICLES);
    CATEGORIES = disclosureLast(CURRENT_CATEGORIES);
    document.getElementById('meta-gen').textContent = CURRENT_GEN + ' KST 기준 자동 생성';
    document.getElementById('total-digits').textContent = CURRENT_TOTAL;
  } else {
    try {
      const res = await fetch('archive/' + val, { cache: 'no-store' });
      const data = await res.json();
      ARTICLES = disclosureLast(data.articles || []);
      CATEGORIES = disclosureLast(data.categories || categoriesFromArticles(ARTICLES));
      document.getElementById('meta-gen').textContent = data.generated_at + ' KST 기준 (지난 다이제스트)';
      document.getElementById('total-digits').textContent = data.total;
    } catch (err) {
      return;
    }
  }
  active = "전체";
  renderRail();
  renderCards();
}

document.getElementById('search').addEventListener('input', renderCards);
renderRail();
renderCards();
loadArchiveList();
</script>
